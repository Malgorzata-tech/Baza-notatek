<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!--# This meta tag ensures the page is responsive on different devices-->
    <title>Dashboard</title>
</head>
<body>
    <div id="root"></div> <!--# This div is where the React application will be rendered. The id "root" is commonly used as the entry point for React applications.-->
    <script type="module" src="/src/main.jsx"></script> <!--# This script tag includes the main JavaScript file for the React application. 
                            The "type=module" attribute allows us to use ES6 modules in our JavaScript code. 
                            The "src" attribute points to the location of the main JavaScript file, which is typically where the React application is initialized and rendered into the DOM.-->-->
</body>
</html>
